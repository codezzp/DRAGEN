run_id: run_0002
experiment_name: dragen_follow_keyuser_label_v2_roberta_text_feature_v2_seed0

data:
  pack_dir: packs/obs_1800_step300_multiscale_hybrid_tree_feature_v2_global_follow_label_v2_roberta_text_keyuser
  input_variant: MultiScale-HybridTree-FeatureV2-KeyUserPool-LabelV2-RoBERTaText

model:
  name: DRAGEN-Full
  hidden_dim: 64
  role_num: 5
  top_k_global: 20
  global_sampling_mode: key_user_pool
  key_user_max_hops: 4
  key_users_per_window: 32
  text_semantic_dim: 64
  use_global_prior: true
  use_adaptive_sampling: true
  use_memory: true
  use_gate: true
  use_uncertainty: true
  use_role: true
  dropout: 0.1

train:
  epochs: 10
  batch_size: 8
  lr: 0.001
  weight_decay: 0.00001
  seed: 0
  device: auto
  eval_every: 1
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

loss:
  lambda_jump: 0.01
  lambda_struct: 0.005
  lambda_align: 0.001
  lambda_uncertainty: 0.001
  lambda_role: 0.0
  lambda_sampler_edge: 0.005
  lambda_sampler_hub: 0.001
  lambda_sampler_temp: 0.005

logging:
  tensorboard: false
  tb_log_dir:
  plot_every_epoch: false

checkpoint:
  resume:
  save_every_epoch: false

output:
  out_dir: work/artifacts/dragen_follow_keyuser_label_v2_roberta_text_feature_v2_seed0
